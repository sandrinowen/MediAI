services:
  - type: web
    name: mediai-backend
    runtime: docker
    branch: backend-app
    dockerfilePath: ./backend-app/Dockerfile
    dockerContext: ./backend-app
    plan: free
    healthCheckPath: /up
    autoDeployTrigger: commit
    envVars:
      - key: APP_NAME
        value: MediAI
      - key: APP_ENV
        value: production
      - key: APP_KEY
        sync: false
      - key: APP_DEBUG
        value: "false"
      - key: APP_URL
        fromService:
          type: web
          name: mediai-backend
          envVarKey: RENDER_EXTERNAL_URL
      - key: LOG_CHANNEL
        value: stderr
      - key: LOG_LEVEL
        value: info
      - key: DB_CONNECTION
        value: pgsql
      - key: DB_URL
        fromDatabase:
          name: mediai-db
          property: connectionString
      - key: SESSION_DRIVER
        value: database
      - key: CACHE_STORE
        value: database
      - key: QUEUE_CONNECTION
        value: sync
      - key: FILESYSTEM_DISK
        value: local
      - key: MAIL_MAILER
        value: smtp
      - key: MAIL_HOST
        value: smtp-relay.brevo.com
      - key: MAIL_PORT
        value: "587"
      - key: MAIL_SCHEME
        value: smtp
      - key: MAIL_TIMEOUT
        value: "10"
      - key: MAIL_USERNAME
        sync: false
      - key: MAIL_PASSWORD
        sync: false
      - key: MAIL_FROM_ADDRESS
        sync: false
      - key: MAIL_FROM_NAME
        value: MediAI
      - key: HUGGINGFACE_API_TOKEN
        sync: false
      - key: HUGGINGFACE_MODEL
        value: google/gemma-3-12b-it
      - key: HUGGINGFACE_MODEL_URL
        value: https://router.huggingface.co/v1/chat/completions
      - key: HUGGINGFACE_TIMEOUT
        value: "60"
      - key: GOOGLE_CLIENT_IDS
        value: ""

databases:
  - name: mediai-db
    databaseName: mediai
    user: mediai
    plan: free
