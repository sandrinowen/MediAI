[env:esp32dev]
platform = espressif32
board = esp32dev
framework = arduino

; ── Configuration Série (doit matcher Serial.begin dans main.cpp) ──
monitor_speed = 115200
; 921600 échoue sur cet adaptateur/câble ("No serial data received"). 460800 est plus fiable.
upload_speed = 460800

; ── Bibliothèques (Exactement celles utilisées dans main.cpp) ──
lib_deps =
    adafruit/Adafruit MLX90614 Library@^2.1.0
    sparkfun/SparkFun MAX3010x Pulse and Proximity Sensor Library@^1.1.2
    bblanchon/ArduinoJson@^6.21.3

; ─ Options de débogage ──
build_flags =
    -D CORE_DEBUG_LEVEL=3

; ── Configuration du Port USB (À adapter selon votre ordinateur) ──
; ️ DÉCOMMENTEZ LA LIGNE CORRESPONDANT À VOTRE SYSTÈME D'EXPLOITATION :

; Pour WINDOWS (ex: COM3, COM4, COM5...)
; upload_port = COM3
; monitor_port = COM3

; Pour LINUX (ex: /dev/ttyUSB0, /dev/ttyACM0)
; Détection automatique du port (gère ttyUSB0 / ttyUSB1 qui changent selon les rebranchements).
; Si plusieurs cartes sont branchées, décommentez et fixez le port ci-dessous.
upload_port = /dev/ttyUSB*
monitor_port = /dev/ttyUSB*

; Pour MAC (ex: /dev/cu.usbserial-XXXXX)
; upload_port = /dev/cu.usbserial-*
; monitor_port = /dev/cu.usbserial-*